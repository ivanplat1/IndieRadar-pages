<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IndieRadar Report</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #2563eb;
      --error: #b91c1c;
      --accent: #eef2ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d12;
        --card: #151922;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: #2a3140;
        --link: #60a5fa;
        --error: #f87171;
        --accent: #1e293b;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.55rem;
      line-height: 1.25;
      font-weight: 700;
    }
    h2 {
      margin: 32px 0 14px;
      padding-bottom: 8px;
      font-size: 1.08rem;
      letter-spacing: 0.01em;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 16px;
    }
    h3 {
      margin: 24px 0 10px;
      font-size: 1rem;
      font-weight: 700;
      scroll-margin-top: 16px;
    }
    h3.app-review-heading {
      margin: 20px 0 12px;
      font-size: 1.06rem;
      color: var(--text);
    }
    hr.app-divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 32px 0 4px;
    }
    hr.app-divider + h3.app-review-heading {
      margin-top: 0;
    }
    h2#toc + ul,
    h2#toc + p + ul,
    h2#toc ~ ul:first-of-type {
      margin-top: 0;
    }
    article ul:first-of-type a {
      font-weight: 500;
    }
    p {
      margin: 0 0 10px;
      white-space: pre-wrap;
    }
    em { font-style: italic; }
    strong { font-weight: 700; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.92em;
      background: rgba(127, 127, 127, 0.12);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    ul, ol {
      margin: 0 0 14px;
      padding-left: 1.35rem;
    }
    li {
      margin-bottom: 10px;
    }
    li.indent-1, p.indent-1 {
      margin-left: 0.75rem;
    }
    li.indent-2, p.indent-2 {
      margin-left: 1.5rem;
      color: var(--muted);
    }
    p.indent-3, li.indent-3 {
      margin-left: 2.25rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    p.indent-4, li.indent-4 {
      margin-left: 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    p.note-label {
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--text);
    }
    p.note-label.indent-3 {
      margin-left: 2.25rem;
      font-size: 0.92rem;
      color: var(--muted);
    }
    p.review-quote {
      margin: 8px 0 8px 3rem;
      padding: 10px 12px;
      border-left: 3px solid var(--link);
      background: color-mix(in srgb, var(--accent) 70%, var(--card));
      border-radius: 0 10px 10px 0;
      font-size: 0.95rem;
    }
    .meta {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 18px;
    }
    .error {
      color: var(--error);
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, var(--error) 35%, var(--border));
      border-radius: 12px;
      background: color-mix(in srgb, var(--error) 8%, var(--card));
    }
    .loading { color: var(--muted); }
    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <article>
      <div id="status" class="loading">Загрузка…</div>
      <div id="content" hidden></div>
    </article>
    <footer>IndieRadar</footer>
  </main>
  <script src="report-render.js?v=8"></script>
  <script>
    function scrollToHashFragment(behavior = "smooth") {
      const raw = window.location.hash.slice(1);

      if (!raw) {
        return;
      }

      const target = document.getElementById(decodeURIComponent(raw));

      if (target) {
        target.scrollIntoView({ behavior, block: "start" });
      }
    }

    function bindInPageNavigation(container) {
      if (container.dataset.navigationBound === "1") {
        return;
      }

      container.dataset.navigationBound = "1";

      container.addEventListener("click", (event) => {
        const link = event.target.closest('a[href^="#"]');

        if (!link || !container.contains(link)) {
          return;
        }

        const raw = link.getAttribute("href")?.slice(1);

        if (!raw) {
          return;
        }

        const target = document.getElementById(decodeURIComponent(raw));

        if (!target) {
          return;
        }

        event.preventDefault();
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        history.replaceState(null, "", `${window.location.pathname}${window.location.search}#${encodeURIComponent(raw)}`);
      });
    }

    function readParams() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get("q");

      if (q) {
        const parts = q.split("/").filter(Boolean);
        const niche = parts[0] || "productivity";
        const locale = parts[1] || "ru";

        if (parts[2] === "week") {
          return { app: null, locale, niche, period: "week" };
        }

        if (parts[2] === "app" && parts[3]) {
          return { app: parts.slice(3).join("/"), locale, niche, period: null };
        }

        return { app: null, locale, niche, period: null };
      }

      return {
        app: params.get("app"),
        locale: params.get("locale") || "ru",
        niche: params.get("niche") || "productivity",
        period: params.get("period")
      };
    }

    function buildDataUrl({ niche, locale, app, period }) {
      const repoRoot = new URL("../data/reports/", window.location.href);
      let file;

      if (app) {
        file = `${niche}/${locale}/app-${app}.json`;
      } else if (period === "week") {
        file = `${niche}/${locale}/weekly.json`;
      } else {
        file = `${niche}/${locale}/daily.json`;
      }

      return new URL(file, repoRoot);
    }

    async function fetchManifest(niche, locale) {
      const manifestUrl = buildDataUrl({ niche, locale, app: null, period: null });
      manifestUrl.pathname = manifestUrl.pathname.replace(/daily\.json$/, "manifest.json");

      const response = await fetch(manifestUrl.toString(), { cache: "no-store" });

      if (!response.ok) {
        return null;
      }

      return response.json();
    }

    async function fetchReportPayload(params) {
      const primaryUrl = buildDataUrl(params);
      let response = await fetch(primaryUrl.toString(), { cache: "no-store" });

      if (response.ok) {
        return response.json();
      }

      if (params.app && response.status === 404) {
        const manifest = await fetchManifest(params.niche, params.locale);
        const entry = manifest?.apps?.find((item) => item.id === params.app);

        if (entry?.number) {
          const legacyUrl = buildDataUrl({ ...params, app: String(entry.number) });
          response = await fetch(legacyUrl.toString(), { cache: "no-store" });

          if (response.ok) {
            return response.json();
          }
        }
      }

      throw new Error(`Report data not found (${response.status}).`);
    }

    function rewriteReportLinks(markdown, { niche, locale }) {
      return markdown.replace(
        /\[([^\]]+)\]\(([^)]+)\)/g,
        (match, label, href) => {
          if (href.startsWith("#")) {
            return match;
          }

          try {
            const url = new URL(href, window.location.href);

            if (url.pathname.endsWith("/report/") || url.pathname.endsWith("/report/index.html")) {
              const next = new URL(window.location.href);
              next.search = "";

              const q = url.searchParams.get("q");
              if (q) {
                next.searchParams.set("q", q);
              } else {
                const app = url.searchParams.get("app");
                const period = url.searchParams.get("period");
                const linkNiche = url.searchParams.get("niche") || niche;
                const linkLocale = url.searchParams.get("locale") || locale;

                if (app) {
                  next.searchParams.set("q", `${linkNiche}/${linkLocale}/app/${app}`);
                } else if (period === "week") {
                  next.searchParams.set("q", `${linkNiche}/${linkLocale}/week`);
                } else {
                  next.searchParams.set("q", `${linkNiche}/${linkLocale}`);
                }
              }

              if (url.hash) {
                next.hash = url.hash;
              }

              return `[${label}](${next.toString()})`;
            }
          } catch {
            return match;
          }

          return match;
        }
      );
    }

    async function loadReport() {
      const status = document.getElementById("status");
      const content = document.getElementById("content");
      const params = readParams();

      status.textContent = "Загрузка…";
      content.hidden = true;

      try {
        const payload = await fetchReportPayload(params);
        const markdown = rewriteReportLinks(payload.markdown || "", params);
        const generatedAt = payload.generatedAt
          ? new Date(payload.generatedAt).toLocaleString(params.locale === "ru" ? "ru-RU" : "en-US")
          : "";

        document.title = payload.type === "app"
          ? `${payload.appName || "App"} · IndieRadar`
          : payload.type === "weekly"
            ? `IndieRadar · ${params.niche} · week`
            : `IndieRadar · ${params.niche}`;

        const periodLabel = payload.type === "weekly" ? " · week" : "";

        status.hidden = true;
        content.hidden = false;
        content.innerHTML = [
          `<div class="meta">${escapeHtml(params.niche)} · ${escapeHtml(params.locale)}${periodLabel}${generatedAt ? ` · ${escapeHtml(generatedAt)}` : ""}</div>`,
          markdownToHtml(markdown)
        ].join("\n");
        bindInPageNavigation(content);
        requestAnimationFrame(() => scrollToHashFragment("instant"));
      } catch (error) {
        status.hidden = false;
        content.hidden = true;
        const exampleLocale = params.locale === "en" ? "en" : "ru";
        status.innerHTML = `<div class="error">${escapeHtml(error instanceof Error ? error.message : "Unable to load report.")}<br><br>Example: <code>?q=${escapeHtml(params.niche)}/${escapeHtml(exampleLocale)}</code> or <code>?q=${escapeHtml(params.niche)}/${escapeHtml(exampleLocale)}/week</code></div>`;
      }
    }

    window.addEventListener("hashchange", () => scrollToHashFragment("smooth"));
    loadReport();
  </script>
</body>
</html>
